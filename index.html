<!DOCTYPE html>
<html lang="en">
<head>

  <!-- ═══════════════════════════════════════
       MEDPATH — HEAD
       Meta, fonts, styles, PWA setup
  ═══════════════════════════════════════ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#059669" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MedPath" />
  <meta name="description" content="Revision timing engine for Indian MBBS students" />

  <title>MedPath</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="/medpath/manifest.json" />

  <!-- Apple Touch Icon (inline SVG converted to data URI) -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' fill='%23059669' rx='32'/%3E%3Ctext x='96' y='136' font-family='Inter,sans-serif' font-size='120' font-weight='700' fill='white' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E" />

  <!-- Google Fonts — Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <!-- MedPath Styles -->
  <link rel="stylesheet" href="/medpath/app.css" />

</head>
<body>

  <!-- ═══════════════════════════════════════
       OFFLINE BANNER
       Shown when device loses connection
  ═══════════════════════════════════════ -->

  <div id="offline-banner" class="offline-banner hidden">
    <span class="offline-dot">●</span>
    Offline — your data is safe
  </div>

  <!-- ═══════════════════════════════════════
       UPDATE PROMPT
       Non-blocking. Student chooses when.
  ═══════════════════════════════════════ -->

  <div id="update-prompt" class="update-prompt hidden">
    <span class="update-text">MedPath has been updated.</span>
    <button class="update-btn" onclick="applyUpdate()">Refresh</button>
  </div>

  <!-- ═══════════════════════════════════════
       APP SHELL
       Main container for all pages
  ═══════════════════════════════════════ -->

  <div id="app" class="app-shell">

    <!-- ─────────────────────────────────────
         PAGE CONTAINERS
         Only one visible at a time
    ───────────────────────────────────── -->

    <!-- Dashboard Page -->
    <div id="page-dashboard" class="page active" role="main" aria-label="Dashboard">
      <div class="page-content">
        <!-- Rendered by ui.js -->
      </div>
    </div>

    <!-- Subjects Page -->
    <div id="page-subjects" class="page" role="main" aria-label="Subjects">
      <div class="page-content">
        <!-- Rendered by ui.js -->
      </div>
    </div>

    <!-- Search Page -->
    <div id="page-search" class="page" role="main" aria-label="Search">
      <div class="page-content">
        <!-- Rendered by ui.js -->
      </div>
    </div>

    <!-- Progress Page -->
    <div id="page-progress" class="page" role="main" aria-label="Progress">
      <div class="page-content">
        <!-- Rendered by ui.js -->
      </div>
    </div>

    <!-- Settings Page -->
    <div id="page-settings" class="page" role="main" aria-label="Settings">
      <div class="page-content">
        <!-- Rendered by ui.js -->
      </div>
    </div>

    <!-- ─────────────────────────────────────
         BOTTOM NAVIGATION
         Five tabs. Always visible.
    ───────────────────────────────────── -->

    <nav id="bottom-nav" class="bottom-nav" role="navigation" aria-label="Main navigation">

      <button class="nav-tab active" data-page="dashboard" aria-label="Dashboard" onclick="navigateTo('dashboard')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span class="nav-label">Dashboard</span>
      </button>

      <button class="nav-tab" data-page="subjects" aria-label="Subjects" onclick="navigateTo('subjects')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
        </svg>
        <span class="nav-label">Subjects</span>
      </button>

      <button class="nav-tab" data-page="search" aria-label="Search" onclick="navigateTo('search')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="nav-label">Search</span>
      </button>

      <button class="nav-tab" data-page="progress" aria-label="Progress" onclick="navigateTo('progress')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
        </svg>
        <span class="nav-label">Progress</span>
      </button>

      <button class="nav-tab" data-page="settings" aria-label="Settings" onclick="navigateTo('settings')">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        <span class="nav-label">Settings</span>
      </button>

    </nav>

    <!-- ─────────────────────────────────────
         BOTTOM SHEET OVERLAY
         Shared overlay behind all sheets
    ───────────────────────────────────── -->

    <div id="sheet-overlay" class="sheet-overlay hidden" onclick="closeActiveSheet()"></div>

    <!-- ─────────────────────────────────────
         BOTTOM SHEET CONTAINER
         Content injected by ui.js
    ───────────────────────────────────── -->

    <div id="bottom-sheet" class="bottom-sheet" role="dialog" aria-modal="true">
      <div class="sheet-handle"></div>
      <div id="sheet-content" class="sheet-content">
        <!-- Injected by ui.js -->
      </div>
    </div>

  </div><!-- end #app -->

  <!-- ═══════════════════════════════════════
       SCRIPTS
       Load order is critical. Do not change.
  ═══════════════════════════════════════ -->

  <script src="/medpath/curriculum.js"></script>
  <script src="/medpath/dataService.js"></script>
  <script src="/medpath/engines.js"></script>
  <script src="/medpath/ui.js"></script>
  <script src="/medpath/app.js"></script>

</body>
</html>
